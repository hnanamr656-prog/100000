<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

.logo img{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:20px auto;
}

h1{font-size:22px;}

/* أيقونات فوق */
.icons a{
  color:#fff;
  margin:0 10px;
  font-size:22px;
  transition:0.3s;
}
.icons a:hover{
  color:#00ffcc;
  transform:scale(1.2);
}

/* اللينكات */
.link{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.link:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.03);
}

.link:active{
  transform:scale(0.95);
}

.toggle{
  cursor:pointer;
}

/* سهم */
.arrow{
  transition:0.3s;
}
.arrow.rotate{
  transform:rotate(180deg);
}

/* dropdown */
.dropdown{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.6s ease;
}

.dropdown.open{
  max-height:900px;
}

/* تيليجرام أيقونة */
.tg-icon{
  color:#0088cc;
}

/* footer */
.footer{
  margin-top:20px;
  font-size:11px;
  color:#666;
}
