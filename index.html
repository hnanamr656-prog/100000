<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASG</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

.logo img{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:20px auto;
}

/* العنوان */
h1{font-size:22px;}
.sub{color:#aaa; font-size:13px; margin-bottom:20px;}

/* الأيقونات */
.icons a{
  color:#fff;
  margin:0 10px;
  font-size:22px;
}

/* اللينكات */
.link{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.link:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.03);
}

.link:active{
  transform:scale(0.95);
}

/* زرار */
.toggle{
  cursor:pointer;
}

/* السهم */
.arrow{
  transition:0.3s;
}
.arrow.rotate{
  transform:rotate(180deg);
}

/* القوائم */
.dropdown{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.6s ease;
}

.dropdown.open{
  max-height:800px;
}

.footer{
  margin-top:20px;
  font-size:11px;
  color:#666;
}
</style>
</head>
